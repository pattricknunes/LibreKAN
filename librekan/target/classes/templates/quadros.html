<html>
  <head>
    <link rel="preconnect" href="https://fonts.gstatic.com/" crossorigin="" />
    <link rel="stylesheet" as="style" onload="this.rel='stylesheet'" href="https://fonts.googleapis.com/css2?display=swap&amp;family=Manrope%3Awght%40400%3B500%3B700%3B800&amp;family=Noto+Sans%3Awght%40400%3B500%3B700%3B900"/>
    <title>LibreKan</title>
    <link rel="icon" type="image/x-icon" href="data:image/x-icon;base64," />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
        function criarQuadro() {
            let nome = prompt("Digite o nome do novo quadro:");
            if (nome) {
                const form = document.createElement('form');
                form.method = 'POST';
                form.action = '/quadros';
                
                const input = document.createElement('input');
                input.type = 'hidden';
                input.name = 'nome';
                input.value = nome;
                
                form.appendChild(input);
                document.body.appendChild(form);
                form.submit();
            }
        }
    </script>
  </head>
  <body>
    <div class="relative flex size-full min-h-screen flex-col bg-slate-100 group/design-root overflow-x-hidden" style='font-family: Manrope, "Noto Sans", sans-serif;'>
      <div class="layout-container flex h-full grow flex-col">
        <header class="flex items-center justify-between whitespace-nowrap border-b border-solid border-blue-400 bg-blue-700 shadow-lg px-10 py-3">
          <div class="flex items-center gap-4 text-[#0e1b10]">
            <h2 class="text-slate-200 text-xl font-bold leading-tight tracking-[-0.015em]">LibreKan</h2>
          </div>
          <div class="flex flex-1 justify-end gap-8">
            <div class="flex items-center gap-9">
              <a class="text-slate-200 text-md font-medium leading-normal" href="#">Quadros</a>
            </button>
            <div
              class="bg-center bg-no-repeat aspect-square bg-cover rounded-full size-10"
              style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuDBINSWOmxvZuS4M2ak8nYL4Z1mU5Z7_1flSH2Yznqi-r1zKvulcy_445ra58pEiuJlHtvnlE1Mz4oDpp-UsZg6n3OJGMFB5PoVfQxpP-NX1dtjtLjhR85ihqW3777sTarnZ2mgypfLrVfBx53AuOIuvfA6fiKcL3ZorrzuVlZPKy3RHH0q-DpaoVPh2av2OWjQ1x5WrguG2q27Xgai70a3INZIkKHFCEt6iHsG_SNWffv2xNzNLmGigFK6DHpF9dogCjXGhlW1AJA");'
            ></div>
          </div>
        </header>
        <div class="px-40 flex flex-1 justify-center py-5">
          <div class="layout-content-container flex flex-col max-w-[960px] flex-1">
            <div class="flex flex-wrap justify-between gap-3 p-4">
              <p class="text-[#0e1b10] tracking-light text-[32px] font-bold leading-tight min-w-72">Meus Quadros</p>
              <button onclick="criarQuadro()" class="flex min-w-[84px] max-w-[480px] cursor-pointer items-center justify-center overflow-hidden rounded-xl h-8 px-4 bg-blue-500 hover:bg-blue-600 shadow-sm text-[#0e1b10] text-sm shadow-md font-medium leading-normal">
                <span class="truncate text-slate-100">Criar Novo Quadro</span>
              </button>
            </div>
              <div class="grid grid-cols-3 gap-3 p-4">
                <div th:each="quadro:${quadros}">
                  <div class="flex flex-col gap-3 pb-3 hover:scale-[104%]">
                    <div class="quadro flex flex-row justify-center w-full h-[128px] bg-center bg-slate-200 border border-[2px] border-solid border-slate-300 hover:border-blue-600 shadow-md rounded-md">
                      <div class="flex rounded-t-md rounded-b-[0px] shadow-md bg-blue-600 w-full justify-center h-[24px]">
                        <p th:text="${quadro}" class="text-slate-200">Nome do Quadro</p>
                        <form th:action="@{/quadros/excluir}" method="post" class="absolute right-2 top-0">
                          <input type="hidden" th:name="nome" th:value="${quadro}" />
                          <button type="submit" class="text-white font-bold hover:text-red-600 h-[28px]">&times;</button>
                        </form>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
